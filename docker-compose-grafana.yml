version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: sikaremit-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./backend/monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/sikaremit.json
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: sikaremit-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    networks:
      - monitoring

volumes:
  grafana-storage:
  prometheus-storage:

networks:
  monitoring:
    driver: bridge
