name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install django-extensions Werkzeug

    - name: Run migrations
      working-directory: backend
      run: |
        python manage.py migrate --settings=core.settings

    - name: Run backend tests
      working-directory: backend
      run: |
        python manage.py test --settings=core.settings

    - name: Check code quality
      working-directory: backend
      run: |
        pip install flake8 black isort
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
        isort --check-only .

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Type checking
      working-directory: frontend
      run: npm run type-check

    - name: Lint code
      working-directory: frontend
      run: npm run lint

    - name: Build application
      working-directory: frontend
      run: npm run build

    - name: Run unit tests
      working-directory: frontend
      run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Set up PostgreSQL
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '13'
        postgresql password: postgres
        postgresql db: SikaRemit_test

    - name: Install backend dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install django-extensions Werkzeug

    - name: Run backend migrations
      working-directory: backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/SikaRemit_test
      run: |
        python manage.py migrate

    - name: Start Django server
      working-directory: backend
      run: |
        python manage.py runserver 8000 --noreload &
        sleep 5

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci

    - name: Build frontend
      working-directory: frontend
      run: npm run build

    - name: Start Next.js server
      working-directory: frontend
      run: |
        npm run start &
        sleep 10

    - name: Run E2E tests
      working-directory: frontend
      run: npx cypress run --record --parallel

  # =========================================================================
  # STAGING DEPLOY (develop branch → GCP Cloud Run staging)
  # Frontend: Vercel auto-deploys from GitHub (no action needed here)
  # =========================================================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and push Docker image
      working-directory: backend
      run: |
        IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:staging-${{ github.sha }}"
        docker build -t $IMAGE .
        docker push $IMAGE

    - name: Run database migrations
      run: |
        gcloud run jobs execute sikaremit-migrate-staging \
          --region ${{ secrets.GCP_REGION }} \
          --wait \
          --args="python,manage.py,migrate,--noinput" \
          2>/dev/null || echo "::warning::Migration job not configured yet — run migrations manually"

    - name: Deploy to Cloud Run (staging)
      run: |
        gcloud run deploy sikaremit-api-staging \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:staging-${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 3 \
          --set-env-vars "DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=staging,DJANGO_USE_SQLITE=false" \
          --quiet

    - name: Deploy Celery worker (staging)
      run: |
        gcloud run deploy sikaremit-worker-staging \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:staging-${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --no-allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 1 \
          --max-instances 2 \
          --no-cpu-throttling \
          --command "bash,entrypoint-celery.sh" \
          --set-env-vars "DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=staging,DJANGO_USE_SQLITE=false" \
          --quiet

    - name: Print staging URL
      run: |
        echo "🚀 Staging backend deployed!"
        gcloud run services describe sikaremit-api-staging --region ${{ secrets.GCP_REGION }} --format 'value(status.url)'

  # =========================================================================
  # PRODUCTION DEPLOY (main branch → GCP Cloud Run production)
  # Frontend: Vercel auto-deploys from GitHub (no action needed here)
  # =========================================================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and push Docker image
      working-directory: backend
      run: |
        IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:${{ github.sha }}"
        IMAGE_LATEST="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:latest"
        docker build -t $IMAGE -t $IMAGE_LATEST .
        docker push $IMAGE
        docker push $IMAGE_LATEST

    - name: Run database migrations
      run: |
        gcloud run jobs execute sikaremit-migrate \
          --region ${{ secrets.GCP_REGION }} \
          --wait \
          --args="python,manage.py,migrate,--noinput" \
          2>/dev/null || echo "::warning::Migration job not configured yet — run migrations manually"

    - name: Deploy to Cloud Run (production)
      run: |
        gcloud run deploy sikaremit-api \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 10 \
          --timeout 300 \
          --set-env-vars "DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false" \
          --quiet

    - name: Deploy Celery worker (production)
      run: |
        gcloud run deploy sikaremit-worker \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --no-allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 1 \
          --max-instances 5 \
          --no-cpu-throttling \
          --command "bash,entrypoint-celery.sh" \
          --set-env-vars "DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false" \
          --quiet

    - name: Deploy Celery Beat (production)
      run: |
        gcloud run deploy sikaremit-beat \
          --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sikaremit/sikaremit-api:${{ github.sha }} \
          --region ${{ secrets.GCP_REGION }} \
          --platform managed \
          --no-allow-unauthenticated \
          --memory 256Mi \
          --cpu 1 \
          --min-instances 1 \
          --max-instances 1 \
          --no-cpu-throttling \
          --command "bash,entrypoint-celery-beat.sh" \
          --set-env-vars "DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false" \
          --quiet

    - name: Print production URL
      run: |
        echo "🚀 Production backend deployed!"
        gcloud run services describe sikaremit-api --region ${{ secrets.GCP_REGION }} --format 'value(status.url)'
