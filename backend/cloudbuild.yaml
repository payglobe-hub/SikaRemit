# ============================================================================
# SikaRemit Backend — GCP Cloud Build Configuration
# Triggered by GitHub Actions on push to main/develop
# Builds Docker image and deploys to Cloud Run
# ============================================================================

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'
      - '.'
    dir: 'backend'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}'

  # Step 3: Run database migrations
  - name: 'gcr.io/google-appengine/exec-wrapper'
    args:
      - '-i'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-s'
      - '${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}'
      - '--'
      - 'python'
      - 'manage.py'
      - 'migrate'
      - '--noinput'

  # Step 4: Deploy API service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false'
      - '--set-secrets'
      - 'SECRET_KEY=django-secret-key:latest,DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest,MTN_MOMO_API_KEY=mtn-momo-api-key:latest,MTN_MOMO_API_SECRET=mtn-momo-api-secret:latest,MTN_MOMO_SUBSCRIPTION_KEY=mtn-momo-subscription-key:latest,MTN_MOMO_API_URL=mtn-momo-api-url:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,SENTRY_DSN=sentry-dsn:latest'
      - '--add-cloudsql-instances'
      - '${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}'

  # Step 5: Deploy Celery worker service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '3'
      - '--no-cpu-throttling'
      - '--set-env-vars'
      - 'DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false'
      - '--set-secrets'
      - 'SECRET_KEY=django-secret-key:latest,DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,SENTRY_DSN=sentry-dsn:latest'
      - '--add-cloudsql-instances'
      - '${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}'
      - '--command'
      - 'bash,entrypoint-celery.sh'

  # Step 6: Deploy Celery Beat scheduler
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}-beat'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--no-cpu-throttling'
      - '--set-env-vars'
      - 'DJANGO_SETTINGS_MODULE=core.settings,ENVIRONMENT=production,DJANGO_USE_SQLITE=false'
      - '--set-secrets'
      - 'SECRET_KEY=django-secret-key:latest,DATABASE_URL=database-url:latest,REDIS_URL=redis-url:latest,SENTRY_DSN=sentry-dsn:latest'
      - '--add-cloudsql-instances'
      - '${PROJECT_ID}:${_REGION}:${_CLOUD_SQL_INSTANCE}'
      - '--command'
      - 'bash,entrypoint-celery-beat.sh'

# Substitution variables (overridden by GitHub Actions or trigger config)
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'sikaremit-api'
  _ARTIFACT_REPO: 'sikaremit'
  _CLOUD_SQL_INSTANCE: 'sikaremit-db'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest'

timeout: '1200s'
